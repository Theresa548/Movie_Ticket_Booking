<!DOCTYPE html>
<html>
<head>
<title>Cancel Ticket</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    margin-top:120px;
}
</style>
</head>

<body>

<div class="container">

<h2>Cancel Your Ticket 🎟</h2>

<form action="/cancel_preview" method="POST" class="mt-4">

<input type="number"
       name="booking_id"
       class="form-control w-50 mx-auto mb-3"
       placeholder="Enter Booking ID"
       required>

<button type="submit" class="btn btn-danger">
Check Booking
</button>

</form>

</div>

</body>
</html>
