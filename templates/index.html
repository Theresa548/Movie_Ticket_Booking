<!DOCTYPE html>
<html>
<head>
<title>Movie Ticket Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:white;
}

.header{
    text-align:center;
    padding:25px;
    font-size:32px;
    font-weight:bold;
}

.card{
    background:#d5d7dc;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.poster{
    width:100%;
    height:450px;
    object-fit:cover;
}
</style>
</head>

<body>

<!-- Cancel Button (Fixed Top Right Corner) -->
<a href="/cancel"
   class="btn btn-warning position-fixed top-0 end-0 m-4 shadow">
Cancel Ticket
</a>

<div class="header">
🎬 Select a Movie
</div>

<div class="container">
<div class="row">

{% for movie in movies %}
<div class="col-lg-4 col-md-6 mb-4">

<div class="card">

<img src="{{ url_for('static', filename='images/' + movie.poster) }}" class="poster">

<div class="card-body text-center">
<h4>{{ movie.movie_name }}</h4>

<a href="/shows/{{ movie.id }}" class="btn btn-danger w-100 mt-2">
View Shows
</a>

</div>
</div>

</div>
{% endfor %}

</div>
</div>

</body>
</html>
