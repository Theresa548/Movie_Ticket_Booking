<!DOCTYPE html>
<html>
<head>
<title>Movie Ticket Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#0f172a;
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:35px;
font-weight:bold;
}

.movie-card{
transition:0.3s;
}

.movie-card:hover{
transform:scale(1.05);
}

select{
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">
🎬 Movie Ticket Booking System
</div>

<div class="container">

<div class="row">

<!-- Avengers -->
<div class="col-md-4">
<div class="card movie-card">
<img src="/static/images/avengers.jpg" class="card-img-top">

<div class="card-body text-center">

<h5>Avengers Endgame</h5>
<p>Action | 3h 2m</p>

<select class="form-select">
<option>Select Screen</option>
<option>Screen 1</option>
<option>Screen 2</option>
</select>

<select class="form-select">
<option>Select Time</option>
<option>10:00 AM</option>
<option>2:00 PM</option>
<option>7:00 PM</option>
</select>

<!-- ✅ FIXED -->
<a href="/seats?show_id=2" class="btn btn-danger mt-2">
Book Ticket
</a>

</div>
</div>
</div>

<!-- Avatar -->
<div class="col-md-4">
<div class="card movie-card">
<img src="/static/images/avatar.jpg" class="card-img-top">

<div class="card-body text-center">

<h5>Avatar 2</h5>
<p>Sci-Fi | 3h 12m</p>

<select class="form-select">
<option>Select Screen</option>
<option>Screen 1</option>
<option>Screen 3</option>
</select>

<select class="form-select">
<option>Select Time</option>
<option>11:00 AM</option>
<option>3:00 PM</option>
<option>8:00 PM</option>
</select>

<!-- ✅ FIXED -->
<a href="/seats?show_id=1" class="btn btn-danger mt-2">
Book Ticket
</a>

</div>
</div>
</div>

<!-- Inception -->
<div class="col-md-4">
<div class="card movie-card">
<img src="/static/images/inception.jpg" class="card-img-top">

<div class="card-body text-center">

<h5>Inception</h5>
<p>Thriller | 2h 28m</p>

<select class="form-select">
<option>Select Screen</option>
<option>Screen 2</option>
<option>Screen 3</option>
</select>

<select class="form-select">
<option>Select Time</option>
<option>9:00 AM</option>
<option>1:00 PM</option>
<option>6:00 PM</option>
</select>

<!-- ✅ FIXED -->
<a href="/seats?show_id=3" class="btn btn-danger mt-2">
Book Ticket
</a>

</div>
</div>
</div>

</div>

</div>

</body>
</html>
