<!DOCTYPE html>
<html>
<head>
<title>Refund Processed</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#c48351;
    border-radius:20px;
    padding:40px;
    width:450px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    animation:fadeIn 0.8s ease-in-out;
}

.refund-amount{
    font-size:32px;
    font-weight:bold;
    color:#22c55e;
}

.icon{
    font-size:60px;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

<div class="icon">💰</div>

<h2 class="mt-3 text-success">Booking Cancelled</h2>
<p class="text-muted">Your refund has been initiated successfully</p>

<hr>

<p><b>Booking ID:</b> {{ booking_id }}</p>
<p><b>Seats Cancelled:</b> {{ seat_count }}</p>

<div class="refund-amount mt-3">
₹{{ refund_amount }}
</div>

<p class="mt-2">
Refund Method: <b>{{ payment_method }}</b>
</p>

<p class="text-warning mt-3">
⏳ Amount will be credited within 5–7 working days
</p>

<a href="/" class="btn btn-danger w-100 mt-4">
Back to Home
</a>

</div>

</body>
</html>
