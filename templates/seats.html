<!DOCTYPE html>
<html>
<head>

<title>Select Seats</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
}

.row{
margin:10px;
}

.seat{
width:35px;
height:35px;
margin:5px;
background:green;
display:inline-flex;
justify-content:center;
align-items:center;
cursor:pointer;
border-radius:5px;
font-size:12px;
}

.seat.selected{
background:orange;
}

.seat.booked{
background:red;
cursor:not-allowed;
}

.aisle{
display:inline-block;
width:40px;
}

button{
padding:10px 20px;
font-size:16px;
background:#e50914;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#b20710;
}

.screen{
margin:20px;
padding:10px;
background:gray;
color:black;
border-radius:5px;
}

</style>

<script>

let selectedSeats = [];

// Select / Deselect seat
function selectSeat(seat){

if(seat.classList.contains("booked")) return;

let seatNumber = seat.innerText;

seat.classList.toggle("selected");

if(selectedSeats.includes(seatNumber)){
selectedSeats = selectedSeats.filter(s => s !== seatNumber);
}else{
selectedSeats.push(seatNumber);
}

// Update UI
document.getElementById("selected").innerText =
selectedSeats.length > 0 ? selectedSeats.join(", ") : "None";

}

// Send data to payment page
function sendSeats(){

if(selectedSeats.length === 0){
alert("Please select at least one seat");
return false;
}

// Set hidden input
document.getElementById("seatInput").value = selectedSeats.join(",");

// Debug (optional)
console.log("Seats:", selectedSeats);

return true;

}

</script>

</head>

<body>

<h1>Select Your Seats 🎟️</h1>

<div class="screen">SCREEN</div>

<!-- Seat Layout -->
{% for row in ['A','B','C','D','E','F'] %}
<div class="row">

{% for num in range(1,11) %}

{% set seat = row ~ num %}

<div class="seat {% if seat in booked_seats %}booked{% endif %}" onclick="selectSeat(this)">
{{ seat }}
</div>

{% if num == 5 %}
<span class="aisle"></span>
{% endif %}

{% endfor %}

</div>
{% endfor %}

<br>

<p><b>Selected Seats:</b> <span id="selected">None</span></p>

<br>

<!-- FORM -->
<form action="/payment" method="GET" onsubmit="return sendSeats()">

<input type="hidden" name="seats" id="seatInput">

<!-- ✅ NOW USING show_id -->
<input type="hidden" name="show_id" value="{{ show_id }}">

<button type="submit">Confirm Booking</button>

</form>

</body>
</html>
