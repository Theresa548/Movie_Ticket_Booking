<!DOCTYPE html>
<html>
<head>
<title>Select Show</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    margin-top:50px;
}

.show-card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<h2>Select Show Time</h2>

<div class="container">

{% for show in shows %}
<div class="show-card">

<h4>{{ show.movie_name }}</h4>
<p>{{ show.screen }} - {{ show.show_time }}</p>

<a href="/seats?show_id={{ show.id }}" class="btn btn-danger">
Select Seats
</a>

</div>
{% endfor %}

</div>

</body>
</html>
