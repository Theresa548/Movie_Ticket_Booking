<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#0f172a;
    color:white;
}

.payment-box{
    background:white;
    color:black;
    width:420px;
    margin:auto;
    padding:25px;
    border-radius:12px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:#dc3545;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#b02a37;
}
</style>

</head>

<body>

<h1>💳 Payment</h1>

<div class="payment-box">

<h3>Booking Summary</h3>

<p><b>Seats:</b> {{ seats }}</p>
<p><b>Total Amount:</b> ₹{{ amount }}</p>

<button id="pay-btn">Pay with Razorpay</button>

</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

var options = {
    "key": "rzp_test_SdcdrsUYh4HLqZ",   
    "amount": "{{ order.amount }}",  // in paise
    "currency": "INR",
    "name": "Movie Ticket Booking",
    "description": "Seat Booking Payment",
    "order_id": "{{ order.id }}",

    "handler": function (response) {

        // Redirect to success route after payment
        window.location.href =
            "/success?payment_id=" + response.razorpay_payment_id +
            "&show_id={{ show_id }}" +
            "&seats={{ seats }}";
    },

    "theme": {
        "color": "#dc3545"
    }
};

var rzp = new Razorpay(options);

document.getElementById('pay-btn').onclick = function(e){
    rzp.open();
    e.preventDefault();
}

</script>

</body>
</html>
