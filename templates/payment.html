<!DOCTYPE html>
<html>
<head>

<title>Payment</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

.payment-box{
background:white;
color:black;
width:420px;
margin:auto;
padding:25px;
border-radius:12px;
}

.method{
margin:10px;
text-align:left;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#dc3545;
color:white;
cursor:pointer;
}

button:hover{
background:#b02a37;
}

</style>

<script>

// Show payment fields
function showPaymentFields(){

let method = document.querySelector('input[name="method"]:checked').value;

document.getElementById("card").style.display="none";
document.getElementById("upi").style.display="none";
document.getElementById("netbanking").style.display="none";

if(method=="card"){
document.getElementById("card").style.display="block";
}

if(method=="upi"){
document.getElementById("upi").style.display="block";
}

if(method=="netbanking"){
document.getElementById("netbanking").style.display="block";
}

}

// Calculate amount + GST using show_id
function calculateAmount(){

let seatsStr = "{{ seats }}";
let showId = parseInt("{{ show_id }}");

if(!seatsStr || isNaN(showId)){
document.getElementById("summary").innerHTML = "Error loading booking details";
return;
}

let seats = seatsStr.split(",");
let ticketCount = seats.filter(s => s.trim() !== "").length;

// Price based on show_id
let pricePerTicket = 0;

// Avengers (show_id 1–3)
if(showId >= 1 && showId <= 3) pricePerTicket = 250;

// Avatar (show_id 4–6)
else if(showId >= 4 && showId <= 6) pricePerTicket = 300;

// Inception (show_id 7–9)
else if(showId >= 7 && showId <= 9) pricePerTicket = 200;

let subtotal = ticketCount * pricePerTicket;
let gst = subtotal * 0.18;
let total = subtotal + gst;

// Display summary
document.getElementById("summary").innerHTML = `
<b>Tickets:</b> ${ticketCount} <br>
<b>Price per Ticket:</b> ₹${pricePerTicket} <br><br>

<b>Subtotal:</b> ₹${subtotal} <br>
<b>GST (18%):</b> ₹${gst.toFixed(2)} <br>
<hr>
<b>Total Amount:</b> ₹${total.toFixed(2)}
`;

}

// Show payment section
function proceedToPayment(){
document.getElementById("paymentSection").style.display = "block";
document.getElementById("proceedBtn").style.display = "none";
}

window.onload = calculateAmount;

</script>

</head>

<body>

<h1>💳 Payment</h1>

<div class="payment-box">

<!-- STEP 1: BOOKING SUMMARY -->
<h3>Booking Summary</h3>

<div id="summary" style="text-align:left; margin-bottom:20px;"></div>

<button id="proceedBtn" onclick="proceedToPayment()">
Proceed to Payment
</button>

<!-- STEP 2: PAYMENT SECTION -->
<div id="paymentSection" style="display:none; margin-top:20px;">

<h3>Select Payment Method</h3>

<form action="/confirmation" method="GET">

<!-- ✅ Correct hidden fields -->
<input type="hidden" name="seats" value="{{ seats }}">
<input type="hidden" name="show_id" value="{{ show_id }}">

<div class="method">
<input type="radio" name="method" value="card" onclick="showPaymentFields()" required> Credit / Debit Card
</div>

<div class="method">
<input type="radio" name="method" value="upi" onclick="showPaymentFields()"> UPI
</div>

<div class="method">
<input type="radio" name="method" value="netbanking" onclick="showPaymentFields()"> Net Banking
</div>

<br>

<div id="card" style="display:none">
<h4>Card Details</h4>
<input placeholder="Card Number"><br><br>
<input placeholder="Expiry Date"><br><br>
<input placeholder="CVV"><br><br>
</div>

<div id="upi" style="display:none">
<h4>UPI Payment</h4>
<input placeholder="Enter UPI ID"><br><br>
</div>

<div id="netbanking" style="display:none">
<h4>Select Bank</h4>
<select>
<option>SBI</option>
<option>HDFC</option>
<option>ICICI</option>
<option>Axis Bank</option>
</select>
</div>

<br>

<button type="submit">Pay Now</button>

</form>

</div>

</div>

</body>
</html>
